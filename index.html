<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binay Kumar Patel | AccuFine Solutions – Tax & Accounting Consultant, Nepal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --cream: #F9F5EE;
    --white: #FFFFFF;
    --gray: #6B7280;
    --green: #1A6B3C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--navy); overflow-x: hidden; }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(11,31,58,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 68px;
  }
  .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
  .nav-logo img { height: 38px; filter: brightness(0) invert(1); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.25s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta { background: var(--gold); color: var(--navy) !important; padding: 0.45rem 1.2rem !important; border-radius: 4px; font-weight: 600 !important; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { width: 24px; height: 2px; background: var(--white); display: block; }

  .hero {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--navy) 0%, #132d52 60%, #0d2040 100%);
    display: flex; align-items: center; padding: 100px 5% 60px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -100px; right: -100px; width: 600px; height: 600px;
    border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
  }
  .hero-grid {
    max-width: 1200px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold-light); padding: 0.4rem 1rem; border-radius: 100px;
    font-size: 0.82rem; font-weight: 500; margin-bottom: 1.5rem; animation: fadeDown 0.7s ease;
  }
  .hero-badge::before { content: '●'; font-size: 0.6rem; color: var(--gold); }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 4.5vw, 3.6rem); color: var(--white); line-height: 1.15; margin-bottom: 0.6rem; animation: fadeUp 0.8s ease 0.1s both; }
  .hero h1 .highlight { color: var(--gold); }
  .hero-title { font-size: 1.05rem; font-weight: 500; color: rgba(255,255,255,0.65); margin-bottom: 1.4rem; animation: fadeUp 0.8s ease 0.2s both; }
  .hero-desc { color: rgba(255,255,255,0.72); font-size: 0.97rem; line-height: 1.75; max-width: 480px; margin-bottom: 2rem; animation: fadeUp 0.8s ease 0.3s both; }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; animation: fadeUp 0.8s ease 0.4s both; }
  .btn-primary { background: var(--gold); color: var(--navy); padding: 0.75rem 1.8rem; border-radius: 6px; font-weight: 600; font-size: 0.95rem; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(201,168,76,0.35); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.45); }
  .btn-outline { border: 1.5px solid rgba(255,255,255,0.35); color: var(--white); padding: 0.75rem 1.8rem; border-radius: 6px; font-weight: 500; font-size: 0.95rem; text-decoration: none; transition: border-color 0.2s, background 0.2s; }
  .btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .btn-whatsapp { background: #25D366; color: var(--white); padding: 0.75rem 1.8rem; border-radius: 6px; font-weight: 600; font-size: 0.95rem; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; gap: 0.5rem; }
  .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.4); }

  .hero-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px; padding: 2rem; backdrop-filter: blur(10px);
    animation: fadeLeft 0.9s ease 0.3s both;
  }
  .profile-photo-wrap {
    position: relative; width: 150px; height: 150px; margin: 0 auto 1.5rem;
  }
  .profile-photo {
    width: 150px; height: 150px; border-radius: 50%; object-fit: cover; object-position: top center;
    border: 4px solid var(--gold);
    box-shadow: 0 8px 32px rgba(201,168,76,0.4);
  }
  .profile-online {
    position: absolute; bottom: 8px; right: 8px;
    width: 22px; height: 22px; background: #22c55e; border-radius: 50%;
    border: 3px solid rgba(11,31,58,0.8);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5);} 50%{box-shadow:0 0 0 8px rgba(34,197,94,0);} }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--white); text-align: center; margin-bottom: 0.3rem; }
  .card-role { color: var(--gold-light); font-size: 0.88rem; font-weight: 500; text-align: center; margin-bottom: 1.5rem; }
  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
  .stat { background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.15); border-radius: 10px; padding: 0.8rem; text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--gold); display: block; }
  .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
  .contact-list { list-style: none; }
  .contact-list li { display: flex; align-items: center; gap: 0.7rem; color: rgba(255,255,255,0.75); font-size: 0.85rem; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .contact-list li:last-child { border: none; }

  section { padding: 90px 5%; }
  .section-label { font-size: 0.82rem; font-weight: 600; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.6rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 700; color: var(--navy); margin-bottom: 1rem; line-height: 1.2; }
  .section-subtitle { color: var(--gray); font-size: 1rem; line-height: 1.7; max-width: 580px; margin-bottom: 3rem; }
  .container { max-width: 1200px; margin: 0 auto; }

  #services { background: var(--white); }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
  .service-card { background: var(--cream); border: 1px solid #E5DDD0; border-radius: 14px; padding: 2rem 1.8rem; transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s; position: relative; overflow: hidden; }
  .service-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--green)); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; }
  .service-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(11,31,58,0.1); border-color: var(--gold); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; }
  .service-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.6rem; }
  .service-desc { color: var(--gray); font-size: 0.9rem; line-height: 1.65; }

  #about { background: var(--cream); }
  .about-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 5rem; align-items: center; }
  .about-photo-section { position: relative; }
  .about-main-photo {
    width: 100%; border-radius: 20px; object-fit: cover; object-position: top center;
    max-height: 520px;
    box-shadow: 0 20px 60px rgba(11,31,58,0.25);
    border: 3px solid rgba(201,168,76,0.3);
  }
  .about-logo-badge {
    position: absolute; bottom: -20px; right: -20px;
    background: var(--white); border-radius: 16px; padding: 1rem 1.5rem;
    box-shadow: 0 8px 32px rgba(11,31,58,0.15);
    border: 1px solid #E5DDD0;
    display: flex; align-items: center; gap: 0.8rem;
  }
  .about-logo-badge img { height: 40px; }
  .badge-text { font-size: 0.8rem; font-weight: 600; color: var(--navy); line-height: 1.3; }
  .badge-text span { color: var(--gray); font-weight: 400; display: block; }
  .exp-badge {
    position: absolute; top: 20px; left: -20px;
    background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%);
    color: var(--white); border-radius: 12px; padding: 1rem;
    text-align: center; box-shadow: 0 8px 24px rgba(11,31,58,0.3);
  }
  .exp-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--gold); display: block; }
  .exp-text { font-size: 0.75rem; opacity: 0.8; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1.5rem; }
  .skill-tag { background: var(--white); border: 1px solid #DDD; color: var(--navy); padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.83rem; font-weight: 500; transition: border-color 0.2s, background 0.2s; }
  .skill-tag:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .edu-timeline { margin-top: 1.5rem; }
  .edu-entry { display: flex; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid #EEE; }
  .edu-entry:last-child { border: none; }
  .edu-dot { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .edu-name { font-weight: 600; font-size: 0.9rem; color: var(--navy); }
  .edu-year { font-size: 0.82rem; color: var(--gray); }

  .freelance-strip { background: linear-gradient(135deg, var(--navy) 0%, #0d3060 100%); padding: 70px 5%; text-align: center; }
  .freelance-strip h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.5rem); color: var(--white); margin-bottom: 1rem; }
  .freelance-strip p { color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto 2rem; line-height: 1.7; }
  .platform-badges { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .platform-badge { background: rgba(255,255,255,0.08); border: 1px solid rgba(201,168,76,0.3); color: var(--gold-light); padding: 0.55rem 1.4rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; }

  #contact { background: var(--white); }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
  .contact-info h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--navy); margin-bottom: 1rem; }
  .contact-info p { color: var(--gray); line-height: 1.7; margin-bottom: 2rem; }
  .info-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid #EEE; }
  .info-item:last-child { border: none; }
  .info-icon { background: linear-gradient(135deg, var(--gold) 0%, #9a7530 100%); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .info-label { font-size: 0.8rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
  .info-value { color: var(--navy); font-weight: 500; font-size: 0.95rem; }
  .contact-form { background: var(--cream); border-radius: 16px; padding: 2.5rem; border: 1px solid #E5DDD0; }
  .contact-form h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--navy); margin-bottom: 0.4rem; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--white); border: 1.5px solid #DDD; border-radius: 8px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.93rem; color: var(--navy); transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  .form-group textarea { resize: vertical; min-height: 110px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .btn-submit { width: 100%; background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%); color: var(--white); border: none; padding: 0.9rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 0.5rem; }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(11,31,58,0.25); }

  footer { background: var(--navy); color: rgba(255,255,255,0.7); padding: 2.5rem 5%; text-align: center; font-size: 0.88rem; }
  .footer-logo { height: 45px; filter: brightness(0) invert(1); margin-bottom: 0.8rem; }
  footer a { color: var(--gold-light); text-decoration: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeLeft { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }

  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; gap: 3rem; }
    .hero-card { order: -1; max-width: 420px; margin: 0 auto; }
    .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    .about-logo-badge { right: 10px; }
    .exp-badge { left: 10px; }
    .contact-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    .nav-links { display: none; }
    .hamburger { display: flex; }
  }
  @media (max-width: 600px) { section { padding: 60px 5%; } .form-row { grid-template-columns: 1fr; } }

  .future-quals { margin-top: 0.8rem; margin-bottom: 1rem; }
  .qual-item { display: flex; align-items: flex-start; gap: 1rem; padding: 0.85rem 1rem; background: var(--white); border: 1px solid #E5DDD0; border-radius: 10px; margin-bottom: 0.6rem; transition: border-color 0.2s, box-shadow 0.2s; }
  .qual-item:hover { border-color: var(--gold); box-shadow: 0 4px 16px rgba(201,168,76,0.12); }
  .qual-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
  .qual-name { font-weight: 600; font-size: 0.9rem; color: var(--navy); }
  .qual-sub { font-size: 0.8rem; color: var(--gold); font-weight: 500; margin-top: 2px; }

  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
